name: Wake up Supabase
on:
  schedule:
    # S'exécute à 05:00 tous les lundis et jeudis
    - cron: '0 5 * * 1,4'
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -i "${{ secrets.SUPABASE_URL }}" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"